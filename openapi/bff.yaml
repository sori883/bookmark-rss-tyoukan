openapi: 3.1.0
info:
  title: BFF API
  version: 0.0.1
  description: |-
    フロントエンド / MCP / CLI の共通エントリポイント。
    ユースケースを実行し下流サービス (feed, notification) をオーケストレーションする。
    レスポンス型は下流サービスと同一（変換しない）。

servers:
  - url: http://localhost:3010
    description: ローカル開発

paths:
  # ─── フィード管理 ──────────────────────────────────
  /feeds:
    get:
      summary: フィード一覧
      operationId: listFeeds
      security:
        - bearerAuth: []
      responses:
        "200":
          description: feed サービスの GET /feeds と同一
    post:
      summary: フィード登録
      description: feed に登録 → 初回フェッチ指示
      operationId: createFeed
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        "201":
          description: feed サービスの POST /feeds と同一

  /feeds/{id}:
    delete:
      summary: フィード削除
      operationId: deleteFeed
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 削除成功

  /feeds/import-opml:
    post:
      summary: OPMLインポート
      description: OPMLパース → feed に一括登録
      operationId: importOpml
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: feed サービスの POST /feeds/import-opml と同一

  # ─── RSS記事 ───────────────────────────────────────
  /articles:
    get:
      summary: 記事一覧
      operationId: listArticles
      security:
        - bearerAuth: []
      parameters:
        - name: feed_id
          in: query
          schema:
            type: string
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: feed サービスの GET /articles と同一

  /articles/{id}:
    get:
      summary: 記事詳細
      description: feed から記事詳細取得 → 既読更新
      operationId: getArticle
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: feed サービスの GET /articles/:id と同一

  # ─── ブックマーク ──────────────────────────────────
  /bookmarks:
    get:
      summary: ブックマーク一覧
      operationId: listBookmarks
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: feed サービスの GET /bookmarks と同一
    post:
      summary: ブックマーク登録
      description: article_id or URL指定 → feed に本文抽出・保存を指示
      operationId: createBookmark
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                article_id:
                  type: string
                  format: uuid
                url:
                  type: string
      responses:
        "201":
          description: feed サービスの POST /bookmarks と同一

  /bookmarks/search:
    get:
      summary: ブックマーク全文検索
      operationId: searchBookmarks
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: feed サービスの GET /bookmarks/search と同一

  /bookmarks/{id}:
    get:
      summary: ブックマーク詳細
      operationId: getBookmark
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: feed サービスの GET /bookmarks/:id と同一
    delete:
      summary: ブックマーク削除
      operationId: deleteBookmark
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 削除成功

  # ─── 通知 ─────────────────────────────────────────
  /notifications:
    get:
      summary: 通知履歴一覧
      operationId: listNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: notification サービスの GET /notifications と同一

  /notifications/{id}:
    patch:
      summary: 通知既読
      operationId: updateNotification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_read]
              properties:
                is_read:
                  type: boolean
      responses:
        "200":
          description: notification サービスの PATCH /notifications/:id と同一

  # ─── 設定 ─────────────────────────────────────────
  /settings:
    get:
      summary: ユーザ設定取得
      operationId: getSettings
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
    put:
      summary: ユーザ設定更新
      operationId: updateSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SettingsResponse:
      type: object
      properties:
        webhook_url:
          type: string
          nullable: true
        webhook_type:
          type: string
          enum: [slack, discord]
          nullable: true

    UpdateSettingsRequest:
      type: object
      properties:
        webhook_url:
          type: string
        webhook_type:
          type: string
          enum: [slack, discord]
