openapi: 3.1.0
info:
  title: Auth Service API
  version: 0.0.1
  description: |
    認証基盤 — Google OAuth, JWT発行, JWKS公開
    Better Auth ベース。OAuth・セッション管理は Better Auth が提供し、
    サービスJWT発行・JWKS公開はカスタム実装。

servers:
  - url: http://localhost:3000
    description: ローカル開発

paths:
  /auth/sign-in/social:
    post:
      summary: Google OAuth開始
      description: |
        Better Auth のソーシャルログインエンドポイント。
        provider=google を指定して Google 認可フローを開始する。
        callbackURL でコールバック先を指定。
      operationId: startGoogleOAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, callbackURL]
              properties:
                provider:
                  type: string
                  enum: [google]
                callbackURL:
                  type: string
                  description: OAuth完了後のリダイレクト先URL
      responses:
        "200":
          description: 認可URLを返却
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Google認可ページURL
                  redirect:
                    type: boolean

  /auth/callback/{provider}:
    get:
      summary: OAuthコールバック
      description: Better Auth が処理するOAuthコールバック
      operationId: oauthCallback
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google]
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: callbackURL にリダイレクト

  /auth/get-session:
    get:
      summary: セッション情報取得
      description: |
        Better Auth のセッション取得エンドポイント。
        Bearer トークン（bearer プラグイン）またはセッション Cookie で認証。
        OpenAPI の AuthMeResponse 形式で返却。
      operationId: getSession
      security:
        - bearerAuth: []
      responses:
        "200":
          description: セッション情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      summary: 認証ユーザ情報
      description: セッション情報から AuthMeResponse 形式でユーザ情報を返却するラッパー
      operationId: getAuthMe
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/sign-out:
    post:
      summary: ログアウト
      description: Better Auth のログアウトエンドポイント
      operationId: signOut
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ログアウト成功

  /auth/token:
    post:
      summary: JWT取得
      description: Better Auth JWT プラグインでセッションから JWT を発行
      operationId: getToken
      security:
        - bearerAuth: []
      responses:
        "200":
          description: JWT発行成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /auth/service-token:
    post:
      summary: サービスJWT発行
      description: client_id + client_secret でサービス間認証用JWT発行（jose カスタム実装）
      operationId: issueServiceToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceTokenRequest"
      responses:
        "200":
          description: サービスJWT発行成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceTokenResponse"
        "401":
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/.well-known/jwks.json:
    get:
      summary: JWKS公開鍵
      description: ユーザーJWT・サービスJWT共通の公開鍵（Better Auth の JWKS を転送）
      operationId: getJWKS
      responses:
        "200":
          description: JWKS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKSResponse"

  /auth/jwks:
    get:
      summary: JWKS公開鍵（Better Auth デフォルトパス）
      description: Better Auth JWT プラグインが自動提供する JWKS エンドポイント
      operationId: getJWKSBetterAuth
      responses:
        "200":
          description: JWKS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKSResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ServiceTokenRequest:
      type: object
      required: [client_id, client_secret]
      properties:
        client_id:
          type: string
        client_secret:
          type: string

    ServiceTokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: 秒（例: 86400 = 24h）

    TokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT アクセストークン

    SessionResponse:
      type: object
      properties:
        session:
          type: object
          properties:
            id:
              type: string
            userId:
              type: string
            token:
              type: string
            expiresAt:
              type: string
              format: date-time
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            image:
              type: string
              nullable: true

    AuthMeResponse:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string

    JWKSResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
              kid:
                type: string
              alg:
                type: string
              n:
                type: string
              e:
                type: string
              use:
                type: string
                enum: [sig]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
