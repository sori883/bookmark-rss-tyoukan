openapi: 3.1.0
info:
  title: Feed Service API
  version: 0.0.1
  description: フィードCRUD, RSS記事管理, ブックマーク管理, ユーザ設定管理（公開API）

servers:
  - url: http://localhost:3001
    description: ローカル開発

paths:
  /feeds:
    post:
      summary: フィード登録
      operationId: createFeed
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
    get:
      summary: フィード一覧
      operationId: listFeeds
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedResponse"

  /feeds/{id}:
    delete:
      summary: フィード削除
      operationId: deleteFeed
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: 削除成功

  /feeds/fetch:
    post:
      summary: RSS定期取得実行
      operationId: fetchFeeds
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchFeedsRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchFeedsResponse"

  /feeds/import-opml:
    post:
      summary: OPMLインポート
      operationId: importOpml
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportOpmlResponse"

  /articles:
    post:
      summary: 記事保存
      operationId: createArticle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleResponse"
    get:
      summary: 記事一覧
      operationId: listArticles
      security:
        - bearerAuth: []
      parameters:
        - name: feed_id
          in: query
          schema:
            type: string
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: user_id
          in: query
          description: サービスJWT使用時の対象ユーザーID
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedArticles"

  /articles/{id}:
    get:
      summary: 記事詳細
      operationId: getArticle
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleResponse"
    patch:
      summary: 記事更新（既読）
      operationId: updateArticle
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArticleRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleResponse"
    delete:
      summary: 記事削除
      operationId: deleteArticle
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: 削除成功

  /bookmarks:
    post:
      summary: ブックマーク登録
      description: article_id or URL → 本文抽出・保存
      operationId: createBookmark
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookmarkRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"
    get:
      summary: ブックマーク一覧（サービスJWT時はuser_idで対象ユーザー指定可）
      operationId: listBookmarks
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          description: サービスJWT使用時の対象ユーザーID
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBookmarks"

  /bookmarks/search:
    get:
      summary: ブックマーク全文検索
      operationId: searchBookmarks
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBookmarks"

  /bookmarks/{id}:
    get:
      summary: ブックマーク詳細
      operationId: getBookmark
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"
    delete:
      summary: ブックマーク削除
      operationId: deleteBookmark
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: 削除成功

  /articles/mark-read-by-url:
    patch:
      summary: URL指定で既読更新
      operationId: markReadByUrl
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadByUrlRequest"
      responses:
        "200":
          description: 既読更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkReadByUrlResponse"

  /articles/bulk-read:
    patch:
      summary: 記事一括既読更新
      description: 指定した記事IDの記事を一括で既読にする。サービスJWT使用時はuser_idクエリで対象ユーザー指定可能。
      operationId: bulkReadArticles
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          description: サービスJWT使用時の対象ユーザーID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReadRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReadResponse"

  # ─── 設定 ─────────────────────────────────────────
  /settings:
    get:
      summary: ユーザ設定取得
      operationId: getSettings
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
    put:
      summary: ユーザ設定更新
      operationId: updateSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"

  /settings/notification-targets:
    get:
      summary: 通知対象ユーザ一覧（サービスJWT専用）
      description: Webhook設定済みの通知対象ユーザー一覧を返す。AIサービスがダイジェスト送信先を取得するために使用。
      operationId: getNotificationTargets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 通知対象ユーザ一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationTargetsResponse"
        "403":
          description: サービスJWT以外は禁止

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    CreateFeedRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri

    FeedResponse:
      type: object
      required: [id, user_id, url, title, site_url, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        url:
          type: string
        title:
          type: string
        site_url:
          type: string
        last_fetched_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    FetchFeedsRequest:
      type: object
      properties:
        feed_id:
          type: string
          format: uuid

    FetchFeedsResponse:
      type: object
      required: [fetched_count, new_articles_count]
      properties:
        fetched_count:
          type: integer
        new_articles_count:
          type: integer

    ImportOpmlResponse:
      type: object
      required: [imported_count, feeds]
      properties:
        imported_count:
          type: integer
        feeds:
          type: array
          items:
            $ref: "#/components/schemas/FeedResponse"

    CreateArticleRequest:
      type: object
      required: [feed_id, url, title, published_at]
      properties:
        feed_id:
          type: string
          format: uuid
        url:
          type: string
        title:
          type: string
        published_at:
          type: string
          format: date-time

    ArticleResponse:
      type: object
      required: [id, user_id, feed_id, url, title, description, is_read, is_bookmarked, published_at, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        feed_id:
          type: string
          format: uuid
        url:
          type: string
        title:
          type: string
        description:
          type: string
          description: 記事概要（RSSのdescription）
        og_image_url:
          type: string
          nullable: true
          description: OG画像URL
        is_read:
          type: boolean
        is_bookmarked:
          type: boolean
          description: ブックマーク済みフラグ
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateArticleRequest:
      type: object
      properties:
        is_read:
          type: boolean

    PaginatedArticles:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ArticleResponse"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CreateBookmarkRequest:
      type: object
      properties:
        article_id:
          type: string
          format: uuid
        url:
          type: string

    BookmarkResponse:
      type: object
      required: [id, user_id, url, title, content_markdown, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        article_id:
          type: string
          format: uuid
          nullable: true
        url:
          type: string
        title:
          type: string
        content_markdown:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginatedBookmarks:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BookmarkResponse"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    BulkReadRequest:
      type: object
      required: [article_ids]
      properties:
        article_ids:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 100

    BulkReadResponse:
      type: object
      required: [updated_count]
      properties:
        updated_count:
          type: integer

    MarkReadByUrlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string

    MarkReadByUrlResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    SettingsResponse:
      type: object
      properties:
        webhook_url_registered:
          type: boolean
          description: Webhook URLが登録済みか（URLは返さない）
        webhook_type:
          type: string
          enum: [slack, discord]
          nullable: true
        notification_hour:
          type: integer
          description: 通知時間 (0-23, デフォルト 9)

    UpdateSettingsRequest:
      type: object
      properties:
        webhook_url:
          type: string
          description: HTTPS必須
        webhook_type:
          type: string
          enum: [slack, discord]
        notification_hour:
          type: integer
          minimum: 0
          maximum: 23

    NotificationTargetsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            required: [user_id, webhook_url, webhook_type, notification_hour]
            properties:
              user_id:
                type: string
                format: uuid
              webhook_url:
                type: string
              webhook_type:
                type: string
              notification_hour:
                type: integer

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
