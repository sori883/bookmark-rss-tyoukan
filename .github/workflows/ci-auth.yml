name: CI / auth

on:
  push:
    branches: [main]
    paths:
      - 'services/auth/**'
      - 'packages/db/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/auth/**'
      - 'packages/db/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm test
